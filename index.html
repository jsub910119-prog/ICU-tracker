<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ICU 인계장">
<title>ICU 인계장</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(180deg, #f8f8fb 0%, #f2f2f7 45%, #ececf2 100%);
  color: #1c1c1e;
  font-size: 15px;
  padding-bottom: env(safe-area-inset-bottom);
}

button { transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease; }
button:active { transform: scale(0.97); }

button, input, textarea {
  font-family: inherit;
}

.header {
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 14px 16px 12px;
  border-bottom: 0.5px solid rgba(198,198,200,0.55);
  position: sticky;
  top: 0;
  z-index: 20;
}

.header h1 {
  font-size: 17px;
  font-weight: 700;
  text-align: center;
}

.header-sub {
  margin-top: 4px;
  text-align: center;
  font-size: 11px;
  color: #8e8e93;
}

.wrap {
  padding: 12px;
  max-width: 520px;
  margin: 0 auto;
}

.shift-bar,
.patient-tabs {
  display: flex;
  gap: 7px;
  margin-bottom: 12px;
  padding: 3px;
  border-radius: 15px;
  background: rgba(118,118,128,0.12);
}

.shift-btn,
.pt-tab {
  flex: 1;
  border: none;
  border-radius: 12px;
  background: transparent;
  color: #6e6e73;
  cursor: pointer;
  -webkit-appearance: none;
}

.shift-btn {
  padding: 10px 4px;
  font-size: 14px;
  font-weight: 700;
}

.pt-tab {
  padding: 9px 4px;
  font-size: 13px;
  font-weight: 600;
}

.shift-btn.active {
  background: #ffffff;
  color: #007aff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}

.pt-tab.active {
  background: #ffffff;
  color: #007aff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}

.utility-row {
  display: flex;
  gap: 7px;
  margin-bottom: 12px;
  padding: 3px;
  border-radius: 15px;
  background: rgba(118,118,128,0.12);
}

.utility-btn {
  flex: 1;
  padding: 10px 6px;
  border: 0.5px solid rgba(198,198,200,0.9);
  border-radius: 14px;
  background: rgba(255,255,255,0.95);
  color: #3a3a3c;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  -webkit-appearance: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

.utility-btn.danger {
  color: #ff3b30;
}

.patient-panel {
  display: none;
}

.patient-panel.active {
  display: block;
}

.section {
  background: rgba(255,255,255,0.96);
  border: 0.5px solid rgba(198,198,200,0.55);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 11px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.045);
}

.section-title {
  font-size: 11px;
  font-weight: 800;
  color: #8e8e93;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

input[type=text],
textarea {
  width: 100%;
  padding: 9px 10px;
  font-size: 14px;
  border: 0.5px solid rgba(198,198,200,0.95);
  border-radius: 12px;
  background: #f7f7fa;
  color: #1c1c1e;
  -webkit-appearance: none;
  outline: none;
}

input[type=text]:focus,
textarea:focus {
  border-color: #007aff;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.10);
}

textarea {
  resize: vertical;
  min-height: 76px;
  line-height: 1.45;
}

.basic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.basic-grid .full {
  grid-column: 1 / -1;
}

.fluid-row {
  display: grid;
  grid-template-columns: 1fr 76px 28px;
  gap: 6px;
  align-items: center;
  margin-bottom: 7px;
}

.fluid-input-wrap {
  position: relative;
}

.fluid-name-input {
  width: 100%;
  padding: 9px 28px 9px 10px;
  font-size: 13px;
  border: 0.5px solid rgba(198,198,200,0.95);
  border-radius: 12px;
  background: #f7f7fa;
  color: #1c1c1e;
  -webkit-appearance: none;
  outline: none;
}

.fluid-name-input:focus {
  border-color: #007aff;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.10);
}

.dropdown-arrow {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: #8e8e93;
  pointer-events: none;
}

.fluid-dropdown {
  position: absolute;
  top: calc(100% + 5px);
  left: 0;
  right: 0;
  background: #ffffff;
  border: 0.5px solid rgba(198,198,200,0.9);
  border-radius: 14px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(0,0,0,0.18);
  display: none;
  max-height: 230px;
  overflow-y: auto;
}

.fluid-dropdown.open {
  display: block;
}

.dropdown-item {
  padding: 11px 14px;
  font-size: 13px;
  color: #1c1c1e;
  cursor: pointer;
  border-bottom: 0.5px solid #f2f2f7;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:active {
  background: #f2f2f7;
}

.add-btn {
  width: 100%;
  height: 38px;
  padding: 0;
  font-size: 22px;
  line-height: 1;
  font-weight: 500;
  color: #007aff;
  border: none;
  border-radius: 13px;
  background: rgba(0,122,255,0.09);
  cursor: pointer;
  margin-top: 6px;
  -webkit-appearance: none;
}

.add-btn:active {
  background: rgba(0,122,255,0.16);
}

.remove-btn {
  width: 28px;
  height: 28px;
  font-size: 20px;
  line-height: 1;
  color: #ff3b30;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.bp-row:last-child {
  margin-bottom: 0;
}

.bp-label {
  font-size: 12px;
  color: #8e8e93;
  white-space: nowrap;
  min-width: 62px;
}

.bp-range {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.bp-range input {
  text-align: center;
  flex: 1;
}

.bp-sep {
  font-size: 13px;
  color: #8e8e93;
  flex-shrink: 0;
}

.drug-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 7px;
  flex: 1;
}

.drug-subrow {
  display: grid;
  grid-template-columns: 74px 1fr;
  align-items: center;
  gap: 6px;
  width: 100%;
}

.drug-input {
  text-align: center;
  width: 74px !important;
  flex-shrink: 0;
}

.unit-toggle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  padding: 3px;
  border: none;
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  background: rgba(118,118,128,0.12);
}

.unit-btn {
  padding: 8px 0;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-right: none;
  border-radius: 9px;
  background: transparent;
  color: #6e6e73;
  cursor: pointer;
  -webkit-appearance: none;
}

.unit-btn:last-child {
  border-right: none;
}

.unit-btn.active {
  background: #ffffff;
  color: #007aff;
  box-shadow: 0 1px 5px rgba(0,0,0,0.10);
}

.note-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.note-row {
  display: grid;
  grid-template-columns: 30px 1fr 28px;
  gap: 6px;
  align-items: center;
}

.note-row.single {
  grid-template-columns: 30px 1fr;
}

.note-check {
  width: 30px;
  height: 30px;
  border-radius: 9px;
  border: 1px solid #c6c6c8;
  background: #ffffff;
  color: #8e8e93;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  -webkit-appearance: none;
}

.note-row.done .note-check {
  border-color: #ff3b30;
  color: #ff3b30;
  background: #fff5f5;
}

.note-text {
  min-width: 0;
}

.note-row.done .note-text {
  color: #8e8e93;
  text-decoration-line: line-through;
  text-decoration-color: #ff3b30;
  text-decoration-thickness: 2px;
}

.note-delete {
  width: 28px;
  height: 28px;
  font-size: 18px;
  line-height: 1;
  color: #ff3b30;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
}

.time-table {
  width: 100%;
  border-collapse: collapse;
}

.time-table th {
  font-size: 11px;
  font-weight: 700;
  color: #8e8e93;
  padding: 4px 4px 8px;
  text-align: center;
}

.time-table th:first-child {
  text-align: right;
}

.time-table tr:not(:last-child) td {
  border-bottom: 0.5px solid #f2f2f7;
}

.time-label {
  font-size: 12px;
  color: #8e8e93;
  text-align: right;
  padding: 5px 8px 5px 0;
  white-space: nowrap;
  font-weight: 600;
}

.time-input {
  width: 100%;
  padding: 8px 4px;
  font-size: 14px;
  border: 0.5px solid rgba(198,198,200,0.95);
  border-radius: 12px;
  background: #f7f7fa;
  color: #1c1c1e;
  text-align: center;
  -webkit-appearance: none;
  outline: none;
}

.time-input:focus {
  border-color: #007aff;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.10);
}

td {
  padding: 3px 2px;
}

.saved-toast {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  background: rgba(28,28,30,0.92);
  color: #ffffff;
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 200;
}

.saved-toast.show {
  opacity: 1;
}
</style>
</head>
<body>

<div class="header">
  <h1>ICU 인계장</h1>
  <div class="header-sub" id="saveStatus">자동 저장 준비됨</div>
</div>

<div class="wrap">
  <div class="shift-bar">
    <button class="shift-btn active" onclick="selectShift(0)">DAY</button>
    <button class="shift-btn" onclick="selectShift(1)">EVENING</button>
    <button class="shift-btn" onclick="selectShift(2)">NIGHT</button>
  </div>

  <div class="patient-tabs">
    <button class="pt-tab active" onclick="selectPt(0)">환자 1</button>
    <button class="pt-tab" onclick="selectPt(1)">환자 2</button>
    <button class="pt-tab" onclick="selectPt(2)">환자 3</button>
  </div>

  <div class="utility-row">
    <button class="utility-btn danger" onclick="resetCurrentPatient()">현재 환자 초기화</button>
  </div>

  <div id="panels"></div>
</div>

<div class="saved-toast" id="toast">저장됨</div>

<script>
const STORAGE_KEY = 'icu_tracker_v2_state';

const SHIFTS = [
  { label: 'DAY',     hours: ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00'] },
  { label: 'EVENING', hours: ['14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'] },
  { label: 'NIGHT',   hours: ['23:00','00:00','01:00','02:00','03:00','04:00','05:00'] }
];

const FLUID_LIST = [
  '10DW 1L','10DW 500ml','5DW 1L','5DW 500ml',
  'NS 1L','NS 500ml','NS 250ml',
  'H/S 1L','H/D 1L',
  'fructose 500ml','5DW 200ml',
  'P/S 1L','P/S 500ml',
  '10DWNaK1 1L','10DWNaK2 1L'
];

const DRUG_LIST = [
  'NE','Vasopressin','Dopamin','Dobutamin','Binicapin','Nimodipine'
];

let curShift = 0;
let curPt = 0;
let saveTimer = null;
let toastTimer = null;

function createPatient() {
  return {
    basic: { name: '', room: '', diagnosis: '' },
    shifts: SHIFTS.map(() => ({
      fluids: [{ name: '', rate: '' }],
      bp: { min: '', max: '' },
      drug: { name: '', amount: '', unit: 'cc' },
      memo: '',
      notes: [{ text: '', done: false }],
      records: {}
    }))
  };
}

function createState() {
  return {
    version: 2,
    patients: Array.from({ length: 3 }, createPatient)
  };
}

let appState = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return createState();
    const parsed = JSON.parse(saved);
    if (!parsed || !Array.isArray(parsed.patients)) return createState();
    return normalizeState(parsed);
  } catch (e) {
    return createState();
  }
}

function normalizeState(input) {
  const fresh = createState();
  for (let p = 0; p < 3; p++) {
    if (!input.patients[p]) continue;
    fresh.patients[p].basic = Object.assign(fresh.patients[p].basic, input.patients[p].basic || {});
    if (Array.isArray(input.patients[p].shifts)) {
      for (let s = 0; s < 3; s++) {
        fresh.patients[p].shifts[s] = Object.assign(
          fresh.patients[p].shifts[s],
          input.patients[p].shifts[s] || {}
        );
        if (!Array.isArray(fresh.patients[p].shifts[s].fluids) || fresh.patients[p].shifts[s].fluids.length === 0) {
          fresh.patients[p].shifts[s].fluids = [{ name: '', rate: '' }];
        }
        if (!fresh.patients[p].shifts[s].bp) fresh.patients[p].shifts[s].bp = { min: '', max: '' };
        if (!fresh.patients[p].shifts[s].drug) fresh.patients[p].shifts[s].drug = { name: '', amount: '', unit: 'cc' };
        if (fresh.patients[p].shifts[s].drug.name === undefined) fresh.patients[p].shifts[s].drug.name = '';
        if (!['cc','mg','mcg'].includes(fresh.patients[p].shifts[s].drug.unit)) fresh.patients[p].shifts[s].drug.unit = 'cc';
        if (!Array.isArray(fresh.patients[p].shifts[s].notes)) fresh.patients[p].shifts[s].notes = [{ text: '', done: false }];
        if (fresh.patients[p].shifts[s].notes.length === 0) fresh.patients[p].shifts[s].notes = [{ text: '', done: false }];
        fresh.patients[p].shifts[s].notes = fresh.patients[p].shifts[s].notes.map(item => ({
          text: String((item && item.text) || ''),
          done: Boolean(item && item.done)
        }));
        if (!fresh.patients[p].shifts[s].records) fresh.patients[p].shifts[s].records = {};
      }
    }
  }
  return fresh;
}

function getShiftState(p = curPt, s = curShift) {
  return appState.patients[p].shifts[s];
}

function saveState(showToast = false) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  document.getElementById('saveStatus').textContent = '자동 저장됨 · ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (showToast) showSavedToast('저장됨');
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveState(false), 250);
}

function showSavedToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.fluid-input-wrap')) closeAllDropdowns();
});

function closeAllDropdowns() {
  document.querySelectorAll('.fluid-dropdown').forEach(d => d.classList.remove('open'));
}

function toggleDropdown(p, fi) {
  const dd = document.getElementById(`dd_${p}_${fi}`);
  if (!dd) return;
  const isOpen = dd.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) dd.classList.add('open');
}

function selectFluid(p, fi, name) {
  getShiftState(p).fluids[fi].name = name;
  closeAllDropdowns();
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function selectShift(i) {
  curShift = i;
  document.querySelectorAll('.shift-btn').forEach((b,j) => b.classList.toggle('active', j === i));
  renderPanels();
  selectPt(curPt);
}

function selectPt(i) {
  curPt = i;
  document.querySelectorAll('.pt-tab').forEach((b,j) => b.classList.toggle('active', j === i));
  document.querySelectorAll('.patient-panel').forEach((p,j) => p.classList.toggle('active', j === i));
}

function updateBasic(p, key, value) {
  appState.patients[p].basic[key] = value;
  scheduleSave();
}

function updateFluid(p, fi, key, value) {
  getShiftState(p).fluids[fi][key] = value;
  scheduleSave();
}

function updateBp(p, key, value) {
  getShiftState(p).bp[key] = value;
  scheduleSave();
}

function updateDrugName(p, value) {
  getShiftState(p).drug.name = value;
  scheduleSave();
}

function selectDrug(p, name) {
  getShiftState(p).drug.name = name;
  closeAllDropdowns();
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function updateDrugAmount(p, value) {
  getShiftState(p).drug.amount = value;
  scheduleSave();
}

function toggleUnit(p, unit) {
  getShiftState(p).drug.unit = unit;
  closeAllDropdowns();
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function selectUnit(p, unit) {
  toggleUnit(p, unit);
}

function updateMemo(p, value) {
  getShiftState(p).memo = value;
  scheduleSave();
}

function addNote(p) {
  getShiftState(p).notes.push({ text: '', done: false });
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function updateNote(p, ni, value) {
  const notes = getShiftState(p).notes;
  if (!notes[ni]) return;
  notes[ni].text = value;
  scheduleSave();
}

function toggleNote(p, ni) {
  const notes = getShiftState(p).notes;
  if (!notes[ni]) return;
  notes[ni].done = !notes[ni].done;
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function removeNote(p, ni) {
  const notes = getShiftState(p).notes;
  if (!notes[ni]) return;
  notes.splice(ni, 1);
  if (notes.length === 0) notes.push({ text: '', done: false });
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function fmtTemp(raw) {
  raw = String(raw || '').replace(/[^0-9]/g, '');
  if (raw.length === 3) return raw[0] + raw[1] + '.' + raw[2];
  if (raw.length >= 4) return raw[0] + raw[1] + raw[2] + '.' + raw[3];
  return raw;
}

function handleTemp(input, p, h) {
  const s = getShiftState(p);
  const raw = input.value.replace(/[^0-9]/g, '').slice(0, 4);
  if (!s.records[h]) s.records[h] = {};
  s.records[h].temp = raw;
  input.value = raw.length >= 3 ? fmtTemp(raw) : raw;
  scheduleSave();
}

function updateUrine(p, h, value) {
  const s = getShiftState(p);
  if (!s.records[h]) s.records[h] = {};
  s.records[h].urine = String(value || '').replace(/[^0-9]/g, '');
  scheduleSave();
}

function handleUrine(input, p, h) {
  const clean = input.value.replace(/[^0-9]/g, '');
  input.value = clean;
  updateUrine(p, h, clean);
}
function fmtBloodPressure(raw) {
  raw = String(raw || '').replace(/[^0-9]/g, '').slice(0, 6);
  if (raw.length >= 5) return raw.slice(0, 3) + '/' + raw.slice(3);
  return raw;
}

function handleBloodPressure(input, p, h) {
  const s = getShiftState(p);
  const raw = input.value.replace(/[^0-9]/g, '').slice(0, 6);
  if (!s.records[h]) s.records[h] = {};
  s.records[h].bp = raw;
  input.value = fmtBloodPressure(raw);
  scheduleSave();
}

function addFluid(p) {
  getShiftState(p).fluids.push({ name: '', rate: '' });
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function removeFluid(p, fi) {
  const fluids = getShiftState(p).fluids;
  if (fluids.length <= 1) return;
  fluids.splice(fi, 1);
  saveState(true);
  renderPanels();
  selectPt(curPt);
}

function resetCurrentPatient() {
  const ok = confirm(`환자 ${curPt + 1}의 모든 기록을 초기화할까요?`);
  if (!ok) return;
  appState.patients[curPt] = createPatient();
  saveState(true);
  renderPanels();
  selectPt(curPt);
  showSavedToast('초기화됨');
}

function escapeAttr(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';

  for (let p = 0; p < 3; p++) {
    const patient = appState.patients[p];
    const s = getShiftState(p, curShift);
    const hours = SHIFTS[curShift].hours;
    const panel = document.createElement('div');
    panel.className = 'patient-panel' + (p === curPt ? ' active' : '');

    const fluidHTML = s.fluids.map((f, fi) => {
      const ddItems = FLUID_LIST.map(name =>
        `<div class="dropdown-item" onclick="selectFluid(${p},${fi},'${escapeAttr(name)}')">${escapeAttr(name)}</div>`
      ).join('');
      return `
      <div class="fluid-row">
        <div class="fluid-input-wrap">
          <input class="fluid-name-input" type="text" placeholder="수액 선택 / 직접입력"
            value="${escapeAttr(f.name)}"
            oninput="updateFluid(${p},${fi},'name',this.value)"
            onclick="event.stopPropagation();toggleDropdown(${p},${fi})">
          <span class="dropdown-arrow">▼</span>
          <div class="fluid-dropdown" id="dd_${p}_${fi}">${ddItems}</div>
        </div>
        <input type="text" inputmode="numeric" placeholder="mL/hr" value="${escapeAttr(f.rate)}"
          oninput="updateFluid(${p},${fi},'rate',this.value.replace(/[^\\d.]/g,''));this.value=this.value.replace(/[^\\d.]/g,'')"
          style="text-align:center;padding:9px 4px;font-size:13px">
        ${s.fluids.length > 1
          ? `<button class="remove-btn" onclick="removeFluid(${p},${fi})">×</button>`
          : '<span style="width:28px"></span>'}
      </div>`;
    }).join('');

    const tableRows = hours.map(h => {
      const rec = s.records[h] || { urine: '', bp: '', temp: '' };
      const bpDisplay = fmtBloodPressure(rec.bp || '');
      const tempDisplay = rec.temp && rec.temp.length >= 3 ? fmtTemp(rec.temp) : (rec.temp || '');
      return `<tr>
        <td class="time-label">${h}</td>
        <td style="padding:3px 3px">
          <input class="time-input" type="text" inputmode="numeric" placeholder="—" value="${escapeAttr(bpDisplay)}"
            oninput="handleBloodPressure(this,${p},'${h}')">
        </td>
        <td style="padding:3px 3px">
          <input class="time-input" type="text" inputmode="numeric" placeholder="—" value="${escapeAttr(tempDisplay)}"
            oninput="handleTemp(this,${p},'${h}')">
        </td>
        <td style="padding:3px 3px">
          <input class="time-input" type="text" inputmode="numeric" placeholder="—" value="${escapeAttr(rec.urine || '')}"
            oninput="handleUrine(this,${p},'${h}')">
        </td>
      </tr>`;
    }).join('');

    const showNoteDelete = s.notes.length > 1;
    const noteHTML = s.notes.map((item, ni) => `
      <div class="note-row ${item.done ? 'done' : ''} ${showNoteDelete ? '' : 'single'}">
        <button class="note-check" onclick="toggleNote(${p},${ni})">${item.done ? '✓' : ''}</button>
        <input class="note-text" type="text" placeholder="" value="${escapeAttr(item.text)}" oninput="updateNote(${p},${ni},this.value)">
        ${showNoteDelete ? `<button class="note-delete" onclick="removeNote(${p},${ni})">×</button>` : ''}
      </div>`).join('');

    const drugItems = DRUG_LIST.map(name =>
      `<div class="dropdown-item" onclick="selectDrug(${p},'${escapeAttr(name)}')">${escapeAttr(name)}</div>`
    ).join('');

    panel.innerHTML = `
      <div class="section">
        <div class="section-title">환자 정보</div>
        <div class="basic-grid">
          <input type="text" placeholder="이름" value="${escapeAttr(patient.basic.name)}" oninput="updateBasic(${p},'name',this.value)">
          <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="베드" value="${escapeAttr(patient.basic.room)}" oninput="updateBasic(${p},'room',this.value.replace(/[^\\d]/g,''));this.value=this.value.replace(/[^\\d]/g,'')">
          <input class="full" type="text" placeholder="진단명" value="${escapeAttr(patient.basic.diagnosis)}" oninput="updateBasic(${p},'diagnosis',this.value)">
        </div>
      </div>

      <div class="section">
        <div class="section-title">수액</div>
        ${fluidHTML}
        <button class="add-btn" onclick="addFluid(${p})">+</button>
      </div>

      <div class="section">
        <div class="section-title">혈압 범위</div>
        <div class="bp-row">
          <span class="bp-label">범위</span>
          <div class="bp-range">
            <input type="text" inputmode="numeric" placeholder="" value="${escapeAttr(s.bp.min)}" oninput="updateBp(${p},'min',this.value.replace(/[^\\d]/g,''));this.value=this.value.replace(/[^\\d]/g,'')">
            <span class="bp-sep">~</span>
            <input type="text" inputmode="numeric" placeholder="" value="${escapeAttr(s.bp.max)}" oninput="updateBp(${p},'max',this.value.replace(/[^\\d]/g,''));this.value=this.value.replace(/[^\\d]/g,'')">
            <span class="bp-sep">mmHg</span>
          </div>
        </div>
        <div class="bp-row">
          <span class="bp-label">조절량</span>
          <div class="drug-row">
            <div class="fluid-input-wrap">
              <input class="fluid-name-input" type="text" placeholder="약물 선택 / 직접입력"
                value="${escapeAttr(s.drug.name || '')}"
                oninput="updateDrugName(${p},this.value)"
                onclick="event.stopPropagation();toggleDropdown(${p},'drug')">
              <span class="dropdown-arrow">▼</span>
              <div class="fluid-dropdown" id="dd_${p}_drug">${drugItems}</div>
            </div>
            <div class="drug-subrow">
              <input class="drug-input" type="text" inputmode="decimal" placeholder="0" value="${escapeAttr(s.drug.amount)}" oninput="updateDrugAmount(${p},this.value.replace(/[^\d.]/g,''));this.value=this.value.replace(/[^\d.]/g,'')">
              <div class="unit-toggle">
                <button class="unit-btn ${s.drug.unit==='cc' ? 'active' : ''}" onclick="toggleUnit(${p},'cc')">cc</button>
                <button class="unit-btn ${s.drug.unit==='mg' ? 'active' : ''}" onclick="toggleUnit(${p},'mg')">mg</button>
                <button class="unit-btn ${s.drug.unit==='mcg' ? 'active' : ''}" onclick="toggleUnit(${p},'mcg')">mcg</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">체크리스트</div>
        <div class="note-list">${noteHTML}</div>
        <button class="add-btn" onclick="addNote(${p})">+</button>
      </div>

      <div class="section">
        <div class="section-title">메모</div>
        <textarea placeholder="" oninput="updateMemo(${p},this.value)">${escapeAttr(s.memo)}</textarea>
      </div>

      <div class="section">
        <div class="section-title">시간별 기록</div>
        <table class="time-table">
          <thead><tr>
            <th style="text-align:right;padding-right:8px">시간</th>
            <th>혈압</th>
            <th>체온</th>
            <th>소변</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`;

    container.appendChild(panel);
  }
}

renderPanels();
selectPt(curPt);
saveState(false);
</script>
</body>
</html>
